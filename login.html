<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CECATI 97 - Iniciar Sesión</title>
    <link rel="stylesheet" href="css/estilos.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="nav-container">
            <div class="nav-logo">
                <img src="imagenes/logo-cecati.png" alt="CECATI 97 logo">
                <span>CECATI 97</span>
            </div>
            <nav>
                <ul class="nav-links">
                    <li><a href="index.html">Inicio</a></li>
                    <li><a href="cursos.html">Cursos</a></li>
                    <li><a href="registro.html">Registro</a></li>
                    <li><a href="nosotros.html">Nosotros</a></li>
                    <li class="dropdown">
                        <a href="#">Soporte</i></a>
                        <div class="dropdown-content">
                            <a href="preguntas-frecuentes.html">Preguntas Frecuentes</a>
                            <a href="contacto.html">Contacto</a>
                        </div>
                    </li>
                    <li><a href="login.html">Acceso</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="login-main">
        <div class="login-card">
            <!-- Logo contenedor -->
            <div class="login-logo">
                <i class="fas fa-user-graduate" style="font-size: 40px; color: #bf0101;"></i>
            </div>

            <!-- Título y subtítulo -->
            <div class="login-header">
                <p class="login-title">Bienvenido de vuelta</p>
                <span class="login-subtitle">Ingresa tus credenciales para acceder a tu cuenta</span>
            </div>

            <!-- Formulario de login -->
            <form id="login-form" class="login-form">
                <!-- Campo email -->
                <div class="grupo-formulario login-field">
                    <label class="login-label" for="email">Correo electrónico</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-envelope login-icon"></i>
                        <input type="email" id="email" name="email" class="login-input" placeholder="tu@email.com" required>
                    </div>
                </div>

                <!-- Campo contraseña -->
                <div class="grupo-formulario login-field">
                    <label class="login-label" for="password">Contraseña</label>
                    <div class="login-input-wrapper">
                        <i class="fas fa-lock login-icon"></i>
                        <input type="password" id="password" name="password" class="login-input" placeholder="••••••••" required>
                    </div>
                </div>

                <!-- Botón de inicio de sesión -->
                <button type="submit" class="btn">Iniciar sesión</button>
            </form>
        </div>
    </main>

    <footer>
        <p>© 2026 CECATI 97 - Tonalá, Jalisco</p>
    </footer>

    <script>
        document.getElementById('login-form')?.addEventListener('submit', function(e) {
            e.preventDefault();
            alert('Inicio de sesión exitoso (simulación).');
        });
    </script>
</body>
</html>
